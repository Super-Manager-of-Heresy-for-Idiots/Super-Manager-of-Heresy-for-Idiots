apiVersion: apps/v1
kind: Deployment
metadata:
  name: dndapp-backend
  namespace: dndapp
  labels:
    app.kubernetes.io/name: dndapp-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: dndapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dndapp-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dndapp-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: dndapp
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: backend
          image: dndapp-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
