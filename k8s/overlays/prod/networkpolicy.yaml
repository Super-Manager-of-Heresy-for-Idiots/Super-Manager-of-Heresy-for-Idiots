# Locks down the database: once a NetworkPolicy selects the postgres pods, all
# ingress to them is denied EXCEPT what is explicitly allowed here — i.e. only
# the backend pods may reach 5432. This contains lateral movement if any other
# pod in the namespace is compromised. It does NOT touch ingress to the backend
# itself, so the app's external reachability (ingress-nginx -> backend) is
# unaffected. `kubectl port-forward` to postgres still works (it goes through
# the API server, not the pod network).
#
# Requires a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea, ...).
# On a CNI without enforcement this manifest is simply inert (no effect).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-backend
  namespace: dndapp
  labels:
    app.kubernetes.io/part-of: dndapp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      ports:
        - protocol: TCP
          port: 5432
