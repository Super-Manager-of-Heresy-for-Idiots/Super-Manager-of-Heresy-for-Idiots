apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dndapp-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: dndapp
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dndapp
  source:
    # Замени на свой репозиторий
    repoURL: https://github.com/YOUR_USERNAME/SuperManagerofHeresyforIdiots.git
    targetRevision: main
    path: SuperManagerofHeresyforIdiots/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: dndapp
  syncPolicy:
    # Prod — ручной sync, без auto-prune
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
