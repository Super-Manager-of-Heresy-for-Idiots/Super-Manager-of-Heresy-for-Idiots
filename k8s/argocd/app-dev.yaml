apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dndapp-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: dndapp
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dndapp
  source:
    # Замени на свой репозиторий
    repoURL: https://github.com/YOUR_USERNAME/SuperManagerofHeresyforIdiots.git
    targetRevision: develop
    path: SuperManagerofHeresyforIdiots/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dndapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
