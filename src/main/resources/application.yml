spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dndapp}
    username: ${SPRING_DATASOURCE_USERNAME:?DB username must be set}
    password: ${SPRING_DATASOURCE_PASSWORD:?DB password must be set}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: dndapp-pool
      # Per-pod connection ceiling. With N pods the DB sees up to N * maximum-pool-size
      # connections, so this MUST be sized against Postgres max_connections:
      #   maximum-pool-size <= (max_connections - reserved) / expected_pod_count
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      # 0 = disabled; set to e.g. 30000 in non-prod to surface leaked connections.
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:0}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  liquibase:
    change-log: classpath:db/changelog/master.xml
  threads:
    virtual:
      enabled: true
  security:
    filter:
      # Exclude ASYNC: CompletableFuture controllers re-dispatch through the servlet ASYNC type where
      # the JWT filter (OncePerRequestFilter) doesn't re-run, so security would 403 the empty context.
      dispatcher-types: request,error
  servlet:
    multipart:
      # Upload ceiling for the media module. Per-owner-type limits (avatar 5MB / cover 10MB) are
      # enforced in code; this is the hard servlet cap that rejects oversized requests early.
      max-file-size: ${MEDIA_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MEDIA_MULTIPART_MAX_REQUEST_SIZE:11MB}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  # Media module (MinIO-backed images: avatars, portraits, covers). See docs/MINIO_PLAN.md.
  # NB: the MinIO connection itself (minio.endpoint / minio.access-key / minio.secret-key) is bound
  # DIRECTLY from env vars (MINIO_ENDPOINT / MINIO_ACCESS_KEY / MINIO_SECRET_KEY) and is intentionally
  # NOT declared here. That keeps `minio.endpoint` truly absent without env, so @ConditionalOnProperty
  # leaves the whole media module disabled (e.g. the ws role) instead of failing on an unresolved value.
  media:
    bucket: ${CORE_ASSETS_BUCKET:dnd-core-assets}
  jwt:
    secret: ${JWT_SECRET:?JWT_SECRET must be provided (>= 32 bytes)}
    # Access token TTL (short). The session stays alive far longer via silent refresh.
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    # Refresh token TTL (long). Max idle window before the user must log in again. 7d default.
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    access-cookie-name: ${JWT_ACCESS_COOKIE:access_token}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE:refresh_token}
    cookie:
      # Set true in production (https). Must be false for local http dev or the browser drops the cookie.
      secure: ${JWT_COOKIE_SECURE:false}
      # Lax works when FE and API share a site (incl. localhost different ports / dev proxy).
      # Use None (with secure=true) only if FE and API are on different registrable domains.
      same-site: ${JWT_COOKIE_SAMESITE:Lax}
      access-path: ${JWT_COOKIE_ACCESS_PATH:/}
      # Refresh cookie is scoped so it is only sent to the refresh/logout endpoints.
      refresh-path: ${JWT_COOKIE_REFRESH_PATH:/api/auth}
      domain: ${JWT_COOKIE_DOMAIN:}
  internal:
    # Shared secret for service-to-service calls (e.g. map-service -> core BE) on /api/internal/**,
    # presented in the X-Internal-Api-Key header. When blank, all internal endpoints are rejected.
    api-key: ${INTERNAL_API_KEY:}
  messenger:
    # Core -> messenger notifier for block/unfriend (best-effort close-by-pair). Disabled locally by
    # default; the messenger's relationship cache is the fallback when this call is missed.
    http-client-enabled: ${MESSENGER_HTTP_CLIENT_ENABLED:false}
    base-url: ${MESSENGER_BASE_URL:http://localhost:8082}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  ratelimit:
    login-per-minute: ${APP_RATELIMIT_LOGIN_PER_MIN:5}
    register-per-hour: ${APP_RATELIMIT_REGISTER_PER_HOUR:3}
    refresh-per-minute: ${APP_RATELIMIT_REFRESH_PER_MIN:20}
    friend-requests-per-day: ${APP_RATELIMIT_FRIEND_REQUESTS_PER_DAY:30}
    user-search-per-minute: ${APP_RATELIMIT_USER_SEARCH_PER_MIN:30}
  security:
    # Number of reverse proxies (e.g. nginx) in front of the app. Used to pick the trusted hop from
    # X-Forwarded-For so the client IP cannot be spoofed to bypass auth rate limiting. Set to 0 if the
    # app is exposed directly with no proxy.
    trusted-proxy-count: ${APP_TRUSTED_PROXY_COUNT:1}
  websocket:
    endpoint:
      # true = this node terminates client /ws connections (WS role / all-in-one).
      # false = REST/publish-only role: no /ws, only publishes events to the relay.
      enabled: ${APP_WEBSOCKET_ENDPOINT_ENABLED:true}
    relay:
      # false = in-memory SimpleBroker (single pod). true = external STOMP relay (multi-pod).
      enabled: ${APP_WEBSOCKET_RELAY_ENABLED:false}
      host: ${APP_WEBSOCKET_RELAY_HOST:localhost}
      port: ${APP_WEBSOCKET_RELAY_PORT:61613}
      login: ${APP_WEBSOCKET_RELAY_LOGIN:guest}
      passcode: ${APP_WEBSOCKET_RELAY_PASSCODE:guest}
      virtual-host: ${APP_WEBSOCKET_RELAY_VIRTUAL_HOST:/}
  feature-rules:
    # Class-feature rules runtime (see docs/FEATURE_RULES_RUNTIME_ROADMAP.md).
    # runtime-enabled is the master switch: when false the app behaves exactly as before —
    # class feature descriptions are shown as text and no structured rule is executed. The per-subsystem
    # flags below only take effect when runtime-enabled is also true.
    # 2026-07-09: runtime + spells enabled by default so in-battle spell casting (Phase 2.1) works.
    # 2026-07-15: actions + resources enabled by default for battle use-ability Phase 1.
    # To turn spell/ability runtime OFF (e.g. in prod) set the subsystem env flag false (or the
    # master APP_FEATURE_RULES_RUNTIME_ENABLED=false).
    runtime-enabled: ${APP_FEATURE_RULES_RUNTIME_ENABLED:true}
    resources-enabled: ${APP_FEATURE_RULES_RESOURCES_ENABLED:true}
    actions-enabled: ${APP_FEATURE_RULES_ACTIONS_ENABLED:true}
    # 2.2: effects on so buff spells (Bless etc.) actually apply active effects, which concentration
    # then manages. Turn OFF via APP_FEATURE_RULES_EFFECTS_ENABLED=false.
    effects-enabled: ${APP_FEATURE_RULES_EFFECTS_ENABLED:true}
    triggers-enabled: ${APP_FEATURE_RULES_TRIGGERS_ENABLED:false}
    forms-enabled: ${APP_FEATURE_RULES_FORMS_ENABLED:false}
    spells-enabled: ${APP_FEATURE_RULES_SPELLS_ENABLED:true}
    # 2026-07-17: items enabled by default — prod (dnd-gitops backend.yaml) уже включает флаг явно,
    # а локальный дефолт false молча отключал умения homebrew-предметов в бою на дев-стенде.
    items-enabled: ${APP_FEATURE_RULES_ITEMS_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.security: warn
